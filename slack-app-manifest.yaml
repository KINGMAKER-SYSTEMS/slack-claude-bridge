display_information:
  name: johns-claude
  description: John's Claude responding from his laptop
  background_color: "#1a1a1a"
features:
  bot_user:
    display_name: johns-claude
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - chat:write
      - users:read
settings:
  event_subscriptions:
    request_url: https://REPLACE_WITH_TUNNEL_URL/slack/events
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
